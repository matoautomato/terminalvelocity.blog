{{ define "main" }}
<content>
  {{ .Content }}
  <ul class="blog-posts">
    {{ range .Pages }}
    <li>
      <span>
        <i>
          <time datetime='{{ .Date.Format "2006-01-02" }}' pubdate>
            {{ .Date.Format (default "2006-01-02" .Site.Params.dateFormat) }}
          </time>
        </i>
      </span>
      <a href="{{ .RelPermalink }}">{{ .Title }}{{ with .Params.author }} ({{ . }}){{ end }}</a>
    </li>
    {{ else }}
    <li>{{ i18n "no-posts" }}</li>
    {{ end }}
  </ul>
</content>
{{ end }}
