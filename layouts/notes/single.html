{{ define "main" }}
<p class="note-date">
  <time datetime='{{ .Date.Format "2006-01-02" }}' pubdate>
    {{ .Date.Format (default "2006-01-02" .Site.Params.dateFormat) }}
  </time>
  {{ with .Title }}– {{ . }}{{ end }}
</p>
<content>
  {{ .Content }}
</content>
<p>
  <a href="{{ .Parent.RelPermalink }}">← Back to notes</a>
</p>
{{ end }}
